<!doctype html>
<html lang="pt-br">
  <head>
    <!-- Metadados -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Título -->
    <title>Gerador de Senhas</title>
    <link rel="icon" type="image/svg+xml" href="assets/sueidy.svg">

    <!-- Estilos -->
    <link rel="stylesheet" href="css/star.css" />
    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <!-- Conteúdo Principal -->
    <main class="site-main container">
      <!-- Gerador de Senhas -->
      <section class="password-generator">
        <!-- Formulário -->
        <form class="generator-form">
          <!-- Exibição da Senha -->
          <div class="password-box">
            <span class="password-text" id="senha-out">clique em gerar</span>
            <button type="button" class="copy-btn" id="copy-btn">copiar</button>
          </div>
          <!-- Barra de Força -->
          <div class="strength-bar-track">
            <div class="strength-bar-fill" id="bar"></div>
          </div>
          <!-- Informações da Força -->
          <div class="strength-label">
            <span id="strength-label"></span>
            <span id="entropy-out"></span>
          </div>
          <!-- Controle de Comprimento -->
          <div class="controls">
            <div class="control-row">
              <label for="len" class="control-label">Comprimento</label>
              <input
                type="range"
                id="len"
                min="6"
                max="64"
                value="34"
                step="1"
              />
              <span class="control-value" id="len-out">34</span>
            </div>
          </div>
          <!-- Opções de Caracteres -->
          <div class="section-title">Caracteres</div>
          <div class="toggle-grid">
            <label class="toggle-item">
              <input type="checkbox" id="opt-upper" checked /> maiúsculas (A-Z)
            </label>
            <label class="toggle-item">
              <input type="checkbox" id="opt-lower" checked /> minúsculas (a-z)
            </label>
            <label class="toggle-item">
              <input type="checkbox" id="opt-digits" checked /> números (0-9)
            </label>
            <label class="toggle-item">
              <input type="checkbox" id="opt-symbols" checked /> símbolos
              (!@$..)
            </label>
            <label class="toggle-item">
              <input type="checkbox" id="opt-ambiguos" checked /> excluir
              ambíguos
            </label>
          </div>
          <!-- Botão Gerar -->
          <button type="button" class="gen-btn" id="gen-btn">
            ⟳ gerar senha
          </button>
        </form>
      </section>
    </main>

    <canvas id="stars-canvas"></canvas>
    <script src="js/script.js"></script>
    <script src="js/stars.js"></script>
  </body>
</html>
